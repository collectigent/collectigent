# Collectigent 配置文件
# 角色模型配置 - 为不同角色设置不同的LLM提供商

# 模型配置预设
model_presets:
  # 平衡预设 - 各角色使用不同模型，分担成本
  balanced:
    leader:
      provider: qwen        # 通义千问
      model: qwen-turbo
      temperature: 0.7
    researcher:
      provider: glm         # 智谱GLM
      model: glm-4
      temperature: 0.6
    critic:
      provider: deepseek    # DeepSeek
      model: deepseek-chat
      temperature: 0.5
    innovator:
      provider: doubao       # 豆包
      model: doubao-pro-32k
      temperature: 0.9
    synthesizer:
      provider: kimi        # KIMI
      model: moonshot-v1-32k
      temperature: 0.6
    executor:
      provider: glm
      model: glm-4
      temperature: 0.5

  # 创意预设 - 创新者使用更强的创意模型
  creative:
    leader:
      provider: qwen
      model: qwen-plus
      temperature: 0.7
    researcher:
      provider: glm
      model: glm-4
      temperature: 0.6
    critic:
      provider: deepseek
      model: deepseek-chat
      temperature: 0.5
    innovator:
      provider: kimi
      model: moonshot-v1-128k
      temperature: 1.0
    synthesizer:
      provider: kimi
      model: moonshot-v1-32k
      temperature: 0.6
    executor:
      provider: glm
      model: glm-4
      temperature: 0.5

  # 批判预设 - 批判者使用更强的逻辑模型
  critical:
    leader:
      provider: qwen
      model: qwen-turbo
      temperature: 0.7
    researcher:
      provider: glm
      model: glm-4
      temperature: 0.6
    critic:
      provider: deepseek
      model: deepseek-coder
      temperature: 0.3
    innovator:
      provider: doubao
      model: doubao-pro-32k
      temperature: 0.9
    synthesizer:
      provider: glm
      model: glm-4
      temperature: 0.6
    executor:
      provider: glm
      model: glm-4
      temperature: 0.5

  # 快速预设 - 使用速度快的小模型
  fast:
    leader:
      provider: qwen
      model: qwen-turbo
      temperature: 0.7
    researcher:
      provider: glm
      model: glm-4-airx
      temperature: 0.6
    critic:
      provider: deepseek
      model: deepseek-chat
      temperature: 0.5
    innovator:
      provider: doubao
      model: doubao-lite-32k
      temperature: 0.9
    synthesizer:
      provider: kimi
      model: moonshot-v1-8k
      temperature: 0.6
    executor:
      provider: glm
      model: glm-4-air
      temperature: 0.5

  # 质量预设 - 使用高质量大模型
  quality:
    leader:
      provider: qwen
      model: qwen-plus
      temperature: 0.7
    researcher:
      provider: glm
      model: glm-4-plus
      temperature: 0.6
    critic:
      provider: deepseek
      model: deepseek-chat
      temperature: 0.4
    innovator:
      provider: kimi
      model: moonshot-v1-128k
      temperature: 1.0
    synthesizer:
      provider: kimi
      model: moonshot-v1-128k
      temperature: 0.5
    executor:
      provider: glm
      model: glm-4-plus
      temperature: 0.4

# API Keys 配置（请填入您的实际API Key）
api_keys:
  openai: ""      # OpenAI API Key (设置环境变量 OPENAI_API_KEY)
  anthropic: ""   # Anthropic API Key (设置环境变量 ANTHROPIC_API_KEY)
  glm: ""         # 智谱AI API Key (设置环境变量 ZHIPU_API_KEY)
  deepseek: ""    # DeepSeek API Key (设置环境变量 DEEPSEEK_API_KEY)
  doubao: ""      # 字节豆包 API Key (设置环境变量 DOUBAO_API_KEY)
  qwen: ""        # 阿里云通义千问 API Key (设置环境变量 QWEN_API_KEY)
  kimi: ""        # Moonshot KIMI API Key (设置环境变量 MOONSHOT_API_KEY)
  minimax: ""     # MiniMax API Key (设置环境变量 MINIMAX_API_KEY)

# 使用的预设配置
active_preset: balanced

# 日志配置
logging:
  level: INFO
  verbose: false
  show_process: false
